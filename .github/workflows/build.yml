name: build

# 태그(v0.1.0 등)를 푸시하면 Windows 설치파일을 빌드해 GitHub Release 초안에 첨부합니다.
# (앱은 Windows 우선. mac/linux가 필요해지면 matrix로 확장하세요 — MAINTAINING.md 참고)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # tauri-action이 Release를 만들려면 필요

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MD Lens ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
