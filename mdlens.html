<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>MD Lens</title>
<style>
  :root {
    --bg:#fbfbf9; --fg:#24292f; --muted:#6a737d; --line:#e2e2de;
    --side:#f3f3ef; --accent:#2f6feb; --code:#f0f0ec; --th:#f4f4f0; --quote:#94a3b8;
  }
  @media (prefers-color-scheme: dark){
    :root { --bg:#1f2125; --fg:#d7dae0; --muted:#8b929c; --line:#34373d;
      --side:#26282d; --accent:#6ea8fe; --code:#2a2d33; --th:#2a2d33; --quote:#566072; }
  }
  *{box-sizing:border-box} html,body{height:100%;margin:0}
  body{display:flex;background:var(--bg);color:var(--fg);font-size:14px;
    font-family:"Segoe UI","Malgun Gothic","Apple SD Gothic Neo",sans-serif}
  button{font:inherit;font-size:12px;color:var(--fg);background:var(--bg);
    border:1px solid var(--line);border-radius:6px;padding:4px 8px;cursor:pointer}
  button:hover{border-color:var(--accent);color:var(--accent)}
  button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  /* sidebar */
  #side{width:248px;min-width:248px;height:100%;overflow-y:auto;background:var(--side);
    border-right:1px solid var(--line);padding:10px}
  #side.hidden{display:none}
  #side .btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  #side h3{font-size:11px;letter-spacing:.06em;color:var(--muted);margin:14px 4px 5px;text-transform:uppercase}
  .entry{display:flex;align-items:center;gap:5px;padding:3px 6px;border-radius:6px;
    cursor:pointer;font-size:12.5px;word-break:break-all}
  .entry:hover{background:var(--code)}
  .entry .grow{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .entry .x{color:var(--muted);visibility:hidden;padding:0 3px}
  .entry:hover .x{visibility:visible} .entry .x:hover{color:#d33}
  .subfiles{margin-left:12px;border-left:1px solid var(--line);padding-left:4px}
  .empty{color:var(--muted);font-size:11.5px;padding:2px 6px}
  .clip{font-family:Consolas,monospace;font-size:11.5px}
  /* main */
  #main{flex:1;height:100%;display:flex;flex-direction:column;min-width:0;position:relative}
  #topbar{display:flex;align-items:center;gap:6px;padding:7px 10px;
    border-bottom:1px solid var(--line);flex-wrap:wrap}
  #flash{font-size:12px;color:var(--accent);margin-left:auto}
  #settings{position:absolute;top:42px;right:10px;z-index:20;background:var(--side);
    border:1px solid var(--line);border-radius:8px;padding:10px 12px;display:flex;
    gap:8px;align-items:center;font-size:12px;box-shadow:0 6px 20px rgba(0,0,0,.25)}
  #settings[hidden]{display:none !important}
  #settings select{font:inherit;font-size:12px;padding:3px 6px;border:1px solid var(--line);
    border-radius:6px;background:var(--bg);color:var(--fg)}
  #trbox{position:fixed;z-index:30;max-width:340px;background:var(--side);border:1px solid var(--line);
    border-radius:8px;padding:6px 8px;font-size:12.5px;box-shadow:0 6px 20px rgba(0,0,0,.28)}
  #trbox button{font-size:11.5px}
  #trbox .trres{white-space:pre-wrap;line-height:1.5;max-height:200px;overflow:auto;color:var(--fg)}
  #panes{flex:1;display:flex;min-height:0}
  .pane{flex:1;display:flex;flex-direction:column;min-width:0;border-right:1px solid var(--line)}
  .pane:last-child{border-right:0}
  .pane.active{box-shadow:inset 0 2px 0 var(--accent)}
  .phead{display:flex;align-items:flex-end;gap:6px;padding:4px 6px 0;font-size:12px;
    color:var(--muted);border-bottom:1px solid var(--line);background:var(--side);min-height:28px}
  .ptabs{display:flex;gap:2px;overflow-x:auto;flex:1;min-width:0}
  .ptab{display:flex;align-items:center;gap:5px;padding:4px 8px;font-size:12px;max-width:190px;
    border:1px solid var(--line);border-bottom:0;border-radius:6px 6px 0 0;
    background:var(--bg);color:var(--muted);cursor:pointer;white-space:nowrap}
  .ptab.on{background:var(--bg);color:var(--fg);border-color:var(--accent);border-bottom:2px solid var(--bg);margin-bottom:-1px}
  .ptab .ptname{overflow:hidden;text-overflow:ellipsis}
  .ptab .tx{color:var(--muted);font-size:10px;flex-shrink:0}
  .ptab .tx:hover{color:#d33}
  .pbody{flex:1;overflow-y:auto;position:relative}
  .pview{max-width:820px;margin:0 auto;padding:22px 30px 60px;line-height:1.75}
  .pedit{position:absolute;inset:0;width:100%;height:100%;border:0;outline:0;resize:none;
    background:var(--bg);color:var(--fg);padding:20px 28px;
    font-family:Consolas,"D2Coding",monospace;font-size:13.5px;line-height:1.6}
  .pbody embed{width:100%;height:100%}
  .drophint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-size:13px;pointer-events:none}
  /* markdown */
  .pview h1{font-size:1.6em;border-bottom:1px solid var(--line);padding-bottom:.25em}
  .pview h2{font-size:1.3em;border-bottom:1px solid var(--line);padding-bottom:.2em;margin-top:1.5em}
  .pview h3{font-size:1.12em;margin-top:1.3em}
  .pview a{color:var(--accent);text-decoration:none} .pview a:hover{text-decoration:underline}
  .pview code{background:var(--code);border-radius:4px;padding:.1em .35em;
    font-family:Consolas,"D2Coding",monospace;font-size:.88em}
  .pview pre.codeblock{background:var(--code);border-radius:8px;padding:12px 15px;overflow-x:auto;line-height:1.5}
  .pview pre.codeblock code{background:none;padding:0}
  .pview pre.frontmatter{color:var(--muted);font-size:.85em;border:1px dashed var(--line);
    border-radius:8px;padding:9px 13px}
  .pview blockquote{margin:1em 0;padding:.15em 1em;border-left:3px solid var(--quote);color:var(--muted)}
  .pview table{border-collapse:collapse;margin:1em 0;display:block;overflow-x:auto;max-width:100%}
  .pview th,.pview td{border:1px solid var(--line);padding:5px 11px;text-align:left}
  .pview th{background:var(--th)}
  .pview hr{border:0;border-top:1px solid var(--line);margin:1.8em 0}
  .pview ul,.pview ol{padding-left:1.5em} .pview li{margin:.18em 0}
  .pview em.img{color:var(--muted)}
  .pview pre.plain{white-space:pre-wrap;font-family:Consolas,"D2Coding",monospace;font-size:13.5px;line-height:1.6}
</style>

<script type="module">
/* ================= markdown parser ================= */
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function inline(s){
  const codes = [];
  const S = String.fromCharCode(1); // 본문에 등장할 수 없는 센티널
  s = s.replace(/`([^`]+)`/g, (m,c)=>{ codes.push(c); return S+(codes.length-1)+S; });
  s = esc(s);
  s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<em class="img">[이미지: $1]</em>');
  s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,
    (m,t,u)=>'<a href="'+u.replace(/"/g,'&quot;')+'" target="_blank" rel="noopener">'+t+'</a>');
  s = s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s = s.replace(/(^|[\s(>])\*([^*\n]+)\*(?=[\s).,!?:;<]|$)/g,'$1<em>$2</em>');
  s = s.replace(/~~([^~]+)~~/g,'<del>$1</del>');
  s = s.replace(new RegExp(S+'([0-9]+)'+S,'g'),(m,n)=>'<code>'+esc(codes[+n] ?? m)+'</code>');
  return s;
}
function splitRow(l){
  l=l.trim(); if(l.startsWith('|')) l=l.slice(1); if(l.endsWith('|')) l=l.slice(0,-1);
  return l.split('|').map(c=>c.trim());
}
function buildList(items){
  const base=items[0].indent, tag=items[0].ordered?'ol':'ul';
  let out=`<${tag}>`;
  for(let k=0;k<items.length;k++){
    if(items[k].indent>base){
      let j=k; while(j<items.length&&items[j].indent>base) j++;
      out=out.slice(0,-5)+buildList(items.slice(k,j))+'</li>'; k=j-1; continue;
    }
    let t=items[k].text;
    const cb=t.match(/^\[( |x|X)\]\s+(.*)$/);
    out+='<li>'+(cb?`<input type="checkbox" disabled${cb[1]!==' '?' checked':''}> `+inline(cb[2]):inline(t))+'</li>';
  }
  return out+`</${tag}>`;
}
function mdToHtml(src, isRoot=true){
  const lines=src.replace(/\r\n?/g,'\n').split('\n'), html=[];
  let i=0, m;
  if(isRoot && lines[0]==='---'){
    let j=1; while(j<lines.length&&lines[j]!=='---') j++;
    if(j<lines.length){ html.push('<pre class="frontmatter">'+esc(lines.slice(1,j).join('\n'))+'</pre>'); i=j+1; }
  }
  while(i<lines.length){
    const line=lines[i];
    if(/^\s*$/.test(line)){ i++; continue; }
    if(/^```/.test(line)){
      const buf=[]; i++;
      while(i<lines.length&&!/^```/.test(lines[i])) buf.push(lines[i++]);
      i++; html.push('<pre class="codeblock"><code>'+esc(buf.join('\n'))+'</code></pre>'); continue;
    }
    if(m=line.match(/^(#{1,6})\s+(.*)/)){
      const l=m[1].length;
      html.push(`<h${l}>`+inline(m[2].replace(/\s#+\s*$/,''))+`</h${l}>`); i++; continue;
    }
    if(/^\s*(-{3,}|\*{3,}|_{3,})\s*$/.test(line)){ html.push('<hr>'); i++; continue; }
    if(/^>/.test(line)){
      const buf=[]; while(i<lines.length&&/^>/.test(lines[i])) buf.push(lines[i++].replace(/^>\s?/,''));
      html.push('<blockquote>'+mdToHtml(buf.join('\n'),false)+'</blockquote>'); continue;
    }
    if(line.includes('|') && i+1<lines.length
       && /^[\s|:\-]+$/.test(lines[i+1]) && lines[i+1].includes('-') && lines[i+1].includes('|')){
      const head=splitRow(line); i+=2; const body=[];
      while(i<lines.length&&lines[i].includes('|')&&lines[i].trim()!==''){ body.push(splitRow(lines[i])); i++; }
      html.push('<table><thead><tr>'+head.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr></thead><tbody>'
        +body.map(r=>'<tr>'+r.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>').join('')+'</tbody></table>');
      continue;
    }
    if(/^(\s*)([-*+]|\d+\.)\s+/.test(line)){
      const items=[];
      while(i<lines.length&&(m=lines[i].match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/))){
        items.push({indent:m[1].replace(/\t/g,'  ').length, ordered:/\d/.test(m[2]), text:m[3]}); i++;
      }
      html.push(buildList(items)); continue;
    }
    const buf=[line]; i++;
    while(i<lines.length&&lines[i].trim()!==''
      &&!/^(#{1,6}\s|```|>|\s*([-*+]|\d+\.)\s)/.test(lines[i])&&!lines[i].includes('|')){
      buf.push(lines[i]); i++;
    }
    html.push('<p>'+buf.map(inline).join('<br>')+'</p>');
  }
  return html.join('\n');
}

/* ================= storage ================= */
const $=id=>document.getElementById(id);
const hasFS='showOpenFilePicker' in window;
const db=await new Promise((res,rej)=>{
  const r=indexedDB.open('mdlens',1);
  r.onupgradeneeded=()=>r.result.createObjectStore('kv');
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
});
const kvGet=k=>new Promise((res,rej)=>{const t=db.transaction('kv').objectStore('kv').get(k);
  t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error);});
const kvSet=(k,v)=>new Promise((res,rej)=>{const t=db.transaction('kv','readwrite').objectStore('kv').put(v,k);
  t.onsuccess=()=>res(); t.onerror=()=>rej(t.error);});

let files=(await kvGet('files'))||[];        // {name, handle, count, last}
let favs=(await kvGet('favs'))||[];          // {name, handle}
let clips=(await kvGet('clips'))||[];        // {t, at}
let fontSize=(await kvGet('fontSize'))||15;
let paneCount=(await kvGet('paneCount'))||1;

function flash(msg){ $('flash').textContent=msg;
  setTimeout(()=>{ if($('flash').textContent===msg) $('flash').textContent=''; },2200); }
async function ensurePerm(h,mode='read'){
  try{ if(await h.queryPermission({mode})==='granted') return true;
    return (await h.requestPermission({mode}))==='granted'; }catch{ return false; }
}

/* ================= panes ================= */
const panes=[];   // {el, view, edit, head, state:{name, handle, raw, kind, url, editing}}
let active=0;

function makePane(idx){
  const el=document.createElement('div'); el.className='pane'; el.dataset.i=idx;
  el.innerHTML=`<div class="phead"><div class="ptabs"></div></div>
    <div class="pbody"><article class="pview"></article><textarea class="pedit" hidden spellcheck="false"></textarea>
    <div class="drophint" data-i18n="dropHint">Drop md · txt · pdf · docx here</div></div>`;
  el.addEventListener('click',()=>setActive(idx));
  el.addEventListener('dragover',e=>e.preventDefault());
  el.addEventListener('drop',e=>{ e.preventDefault(); e.stopPropagation(); setActive(idx); handleDrop(e); });
  return { el, view:el.querySelector('.pview'), edit:el.querySelector('.pedit'),
    tabbar:el.querySelector('.ptabs'), hint:el.querySelector('.drophint'),
    tabs:[], active:-1 };
}
// tab = docState {name, kind, handle, tauriPath, raw, url, htmlCache, editing}
function paneDoc(p){ return p.active>=0 ? p.tabs[p.active] : null; }
function setActive(i){ active=i;
  panes.forEach((p,k)=>p.el.classList.toggle('active',k===active));
  syncEditBtn();
}
function renderTabbar(p){
  p.tabbar.innerHTML='';
  p.tabs.forEach((t,i)=>{
    const tab=document.createElement('div'); tab.className='ptab'+(i===p.active?' on':''); tab.title=t.name;
    const nm=document.createElement('span'); nm.className='ptname'; nm.textContent=t.name; tab.appendChild(nm);
    const x=document.createElement('span'); x.className='tx'; x.textContent='✕';
    x.onclick=e=>{ e.stopPropagation(); closeTab(p,i); }; tab.appendChild(x);
    tab.onclick=()=>{ setActive(panes.indexOf(p)); activateTab(p,i); };
    p.tabbar.appendChild(tab);
  });
}
function activateTab(p,i){
  const cur=paneDoc(p);
  if(cur&&cur.editing) cur.raw=p.edit.value;   // 편집 중이던 탭 내용 보존
  p.active=i; renderActive(p); renderTabbar(p); syncEditBtn();
}
function addTab(p,doc){
  if(doc.tauriPath){   // 같은 파일 이미 열려 있으면 그 탭으로
    const ex=p.tabs.findIndex(t=>t.tauriPath===doc.tauriPath);
    if(ex>=0){ if(doc.url) URL.revokeObjectURL(doc.url); activateTab(p,ex); return; }
  }
  p.tabs.push(doc); activateTab(p,p.tabs.length-1);
}
function closeTab(p,i){
  const t=p.tabs[i]; if(t&&t.url) URL.revokeObjectURL(t.url);
  p.tabs.splice(i,1);
  if(p.active>i) p.active--;
  if(p.active>=p.tabs.length) p.active=p.tabs.length-1;
  renderActive(p); renderTabbar(p); syncEditBtn();
}
function clearPane(i){   // 칸의 모든 탭 닫기
  const p=panes[i];
  p.tabs.forEach(t=>{ if(t.url) URL.revokeObjectURL(t.url); });
  p.tabs=[]; p.active=-1; renderActive(p); renderTabbar(p); syncEditBtn();
}
function layoutPanes(n){
  paneCount=n; kvSet('paneCount',n);
  document.querySelectorAll('.paneBtn').forEach(b=>b.classList.toggle('on',+b.dataset.n===n));
  const box=$('panes');
  while(panes.length<n){ const p=makePane(panes.length); panes.push(p); box.appendChild(p.el); }
  while(panes.length>n){ const p=panes.pop();
    p.tabs.forEach(t=>{ if(t.url) URL.revokeObjectURL(t.url); }); p.el.remove(); }
  if(active>=n) setActive(n-1); else setActive(active);
  applyFont();
}
function applyFont(){ panes.forEach(p=>p.view.style.fontSize=fontSize+'px'); }

function kindOf(name){
  if(/\.(md|markdown)$/i.test(name)) return 'md';
  if(/\.pdf$/i.test(name)) return 'pdf';
  if(/\.docx?$/i.test(name)) return 'docx';
  return 'txt';
}
function renderActive(p){
  const em=p.el.querySelector('embed'); if(em) em.remove();
  const s=paneDoc(p);
  if(!s){ p.view.style.display=''; p.view.innerHTML=''; p.edit.hidden=true; p.hint.style.display=''; return; }
  p.hint.style.display='none';
  if(s.editing){ p.edit.value=s.raw; p.edit.hidden=false; p.view.style.display='none'; return; }
  p.edit.hidden=true;
  if(s.kind==='pdf'){
    p.view.style.display='none';
    const e=document.createElement('embed'); e.src=s.url; e.type='application/pdf';
    p.el.querySelector('.pbody').appendChild(e);
  } else if(s.kind==='docx'){
    p.view.style.display=''; p.view.innerHTML=s.htmlCache||'<p style="color:var(--muted)">비어 있음</p>';
  } else if(s.kind==='md'){
    p.view.style.display=''; p.view.innerHTML=mdToHtml(s.raw);
  } else {
    p.view.style.display=''; p.view.innerHTML='<pre class="plain">'+esc(s.raw)+'</pre>';
  }
  p.view.parentElement.scrollTop=0;
}

let mammothLoading=null;
function loadMammoth(){
  if(window.mammoth) return Promise.resolve();
  if(!mammothLoading) mammothLoading=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js';
    s.onload=res; s.onerror=()=>{mammothLoading=null; rej(new Error('offline'));};
    document.head.appendChild(s);
  });
  return mammothLoading;
}

async function makeDoc(file, handle){   // File → docState (탭 1개 분량)
  const name=file.name, kind=kindOf(name);
  if(kind==='pdf')
    return { name, kind, handle:handle||null, tauriPath:null, url:URL.createObjectURL(file), raw:'', editing:false };
  if(kind==='docx'){
    let html='<p style="color:var(--muted)">'+t('docxFail')+'</p>';
    try{ await loadMammoth(); html=(await window.mammoth.convertToHtml({arrayBuffer:await file.arrayBuffer()})).value; }catch{}
    return { name, kind, handle:handle||null, tauriPath:null, htmlCache:html, raw:'', editing:false };
  }
  return { name, kind, handle:handle||null, tauriPath:null, raw:await file.text(), editing:false };
}
async function openIntoPane(i, file, handle){
  addTab(panes[i], await makeDoc(file, handle));
  if(handle) await pushFile(handle, file.name);
  setActive(i);
}
async function openHandle(h, paneIdx=active){
  if(!await ensurePerm(h)){ flash(t('fPermDenied')); return; }
  await openIntoPane(paneIdx, await h.getFile(), h);
}

/* ================= file log (recents + frequency) ================= */
async function pushFile(handle, name){
  let hit=null;
  for(const f of files){ try{ if(await handle.isSameEntry(f.handle)){ hit=f; break; } }catch{} }
  if(hit){ hit.count=(hit.count||1)+1; hit.last=Date.now(); hit.name=name; }
  else files.push({name, handle, count:1, last:Date.now()});
  files.sort((a,b)=>b.last-a.last); files=files.slice(0,25);
  await kvSet('files',files); drawLists();
}
function entryEl(label,onOpen,onRemove,cls=''){
  const div=document.createElement('div'); div.className='entry '+cls;
  const sp=document.createElement('span'); sp.className='grow'; sp.textContent=label; div.appendChild(sp);
  if(onRemove){ const x=document.createElement('span'); x.className='x'; x.textContent='✕';
    x.onclick=e=>{e.stopPropagation();onRemove();}; div.appendChild(x); }
  div.onclick=onOpen; return div;
}
function drawLists(){
  const rec=$('recentList'); rec.innerHTML='';
  if(!files.length) rec.innerHTML='<div class="empty">'+t('emptyRecent')+'</div>';
  files.slice(0,12).forEach(f=>rec.appendChild(entryEl('📄 '+f.name,
    ()=>openHandle(f.handle),
    async()=>{ files=files.filter(x=>x!==f); await kvSet('files',files); drawLists(); })));
  const fq=$('freqList'); fq.innerHTML='';
  const top=[...files].filter(f=>(f.count||0)>=2).sort((a,b)=>b.count-a.count).slice(0,5);
  if(!top.length) fq.innerHTML='<div class="empty">'+t('emptyFreq')+'</div>';
  top.forEach(f=>fq.appendChild(entryEl(`⭐ ${f.name} (${f.count})`,()=>openHandle(f.handle))));
}
async function listDir(h,depth=0,acc=[],prefix=''){
  if(acc.length>300) return acc;
  for await(const [name,child] of h.entries()){
    if(child.kind==='file'&&/\.(md|markdown|txt|pdf|docx?|rtf|json|jsonc|ya?ml|toml|ini|conf|config|env|xml|csv|tsv|log|m?[jt]sx?|cjs|vue|svelte|py|rs|go|rb|php|java|c|h|cpp|hpp|cs|swift|kt|lua|pl|r|dart|html?|css|s[ca]ss|less|sh|bash|zsh|ps1|bat|cmd|sql|gitignore|gitattributes|dockerignore|editorconfig|properties|gradle)$/i.test(name))
      acc.push({label:prefix+name, handle:child});
    else if(child.kind==='directory'&&depth<2&&!name.startsWith('.')
      &&name!=='node_modules'&&name!=='dist')
      await listDir(child,depth+1,acc,prefix+name+'/');
  }
  return acc;
}
// 디렉토리 트리: 한 단계씩 펼침(하위 폴더 클릭 시 확장). listDir(평면)과 달리 진짜 트리.
async function renderDir(dirHandle, container){
  container.innerHTML='<div class="empty">'+t('reading')+'</div>';
  const dirs=[], docs=[];
  try{
    for await(const [name,child] of dirHandle.entries()){
      if(child.kind==='directory'){
        if(!name.startsWith('.')&&name!=='node_modules'&&name!=='dist') dirs.push([name,child]);
      } else if(/\.(md|markdown|txt|pdf|docx?|rtf|json|jsonc|ya?ml|toml|ini|conf|config|env|xml|csv|tsv|log|m?[jt]sx?|cjs|vue|svelte|py|rs|go|rb|php|java|c|h|cpp|hpp|cs|swift|kt|lua|pl|r|dart|html?|css|s[ca]ss|less|sh|bash|zsh|ps1|bat|cmd|sql|gitignore|gitattributes|dockerignore|editorconfig|properties|gradle)$/i.test(name)) docs.push([name,child]);
    }
  }catch{ container.innerHTML='<div class="empty">'+t('readFail')+'</div>'; return; }
  dirs.sort((a,b)=>a[0].localeCompare(b[0]));
  docs.sort((a,b)=>a[0].localeCompare(b[0]));
  container.innerHTML='';
  if(!dirs.length&&!docs.length){ container.innerHTML='<div class="empty">'+t('emptyDir')+'</div>'; return; }
  for(const [name,child] of dirs){
    const sub=document.createElement('div'); sub.className='subfiles';
    const node=entryEl('📁 '+name, async()=>{
      if(sub.childNodes.length){ sub.innerHTML=''; return; }   // 다시 클릭 = 접기
      if(!await ensurePerm(child)){ flash(t('folderDenied')); return; }
      await renderDir(child, sub);
    });
    const w=document.createElement('div'); w.appendChild(node); w.appendChild(sub);
    container.appendChild(w);
  }
  for(const [name,child] of docs)
    container.appendChild(entryEl('📄 '+name, ()=>openHandle(child)));
}
function drawFavs(){
  const box=$('favList'); box.innerHTML='';
  if(!favs.length){ box.innerHTML='<div class="empty">'+t('emptyFavs')+'</div>'; return; }
  favs.forEach((f,idx)=>{
    const wrap=document.createElement('div');
    const filesBox=document.createElement('div'); filesBox.className='subfiles';
    const head=entryEl('📁 '+f.name, async()=>{
      if(filesBox.childNodes.length){ filesBox.innerHTML=''; return; }
      if(!await ensurePerm(f.handle)){ flash(t('folderDenied')); return; }
      await renderDir(f.handle, filesBox);
    }, async()=>{ favs.splice(idx,1); await kvSet('favs',favs); drawFavs(); });
    wrap.appendChild(head); wrap.appendChild(filesBox); box.appendChild(wrap);
  });
}
function newFile(){
  addTab(panes[active], { name:t('untitled'), handle:null, tauriPath:null, raw:'', kind:'md', editing:false });
  toggleEdit();  // 바로 편집 모드
  flash(t('fNewDoc'));
}
function drawClips(){
  const box=$('clipList'); box.innerHTML='';
  if(!clips.length){ box.innerHTML='<div class="empty">'+t('emptyClips')+'</div>'; return; }
  clips.forEach((c,idx)=>{
    const label=c.t.replace(/\s+/g,' ').slice(0,42)+(c.t.length>42?'…':'');
    box.appendChild(entryEl(label, async()=>{
      try{ await navigator.clipboard.writeText(c.t); flash(t('fCopied')); }catch{ flash(t('fCopyFail')); }
    }, async()=>{ clips.splice(idx,1); await kvSet('clips',clips); drawClips(); }, 'clip'));
  });
}

/* ================= edit / save ================= */
function syncEditBtn(){
  const s=panes[active]?paneDoc(panes[active]):null;
  const editable=s&&(s.kind==='md'||s.kind==='txt');
  $('btnEdit').disabled=!editable;
  $('btnEdit').textContent=s&&s.editing?t('view'):t('edit');
  $('btnSave').hidden=!(s&&s.editing);
}
function toggleEdit(){
  const p=panes[active], s=paneDoc(p);
  if(!s||(s.kind!=='md'&&s.kind!=='txt')) return;
  if(s.editing) s.raw=p.edit.value;   // 보기로 전환 전 편집 내용 반영
  s.editing=!s.editing;
  renderActive(p);
  if(s.editing) p.edit.focus();
  syncEditBtn();
}
async function save(){
  const p=panes[active], s=paneDoc(p);
  if(!s||!s.editing) return;
  const text=p.edit.value;
  if(s.tauriPath && window.__TAURI__){
    try{
      await window.__TAURI__.core.invoke('save_file',{path:s.tauriPath,content:text});
      s.raw=text; flash(t('fSaved')); return;
    }catch(e){ flash(t('fSaveFail')+': '+e); return; }
  }
  if(s.handle&&await ensurePerm(s.handle,'readwrite')){
    const w=await s.handle.createWritable(); await w.write(text); await w.close();
    s.raw=text; flash(t('fSaved'));
  } else if('showSaveFilePicker' in window){
    // 새 파일 or 핸들 없는 경우 = 다른 이름으로 저장(위치 지정)
    try{
      const h=await window.showSaveFilePicker({ suggestedName:s.name||t('untitled'),
        types:[{description:'document',accept:{'text/markdown':['.md','.markdown'],'text/plain':['.txt']}}] });
      const w=await h.createWritable(); await w.write(text); await w.close();
      s.handle=h; s.name=h.name; s.raw=text;
      renderTabbar(p);   // 탭 이름 갱신
      await pushFile(h, h.name);
      flash(t('fSaved'));
    }catch{}
  } else {
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([text],{type:'text/plain'}));
    a.download=s.name||t('untitled'); a.click();
    s.raw=text; flash(t('fDownloaded'));
  }
}

/* ================= events ================= */
async function handleDrop(e){
  const item=e.dataTransfer.items&&e.dataTransfer.items[0];
  if(!item) return;
  if(item.getAsFileSystemHandle){
    const h=await item.getAsFileSystemHandle();
    if(h&&h.kind==='file') await openHandle(h);
  } else {
    const f=item.getAsFile();
    if(f) await openIntoPane(active,f,null);
  }
}
addEventListener('dragover',e=>e.preventDefault());
addEventListener('drop',e=>{ e.preventDefault(); handleDrop(e); });

const OPEN_EXTS=['.md','.markdown','.txt','.pdf','.docx','.doc','.rtf','.json','.jsonc','.yml','.yaml','.toml','.ini','.conf','.config','.env','.xml','.csv','.tsv','.log','.js','.mjs','.cjs','.ts','.tsx','.jsx','.vue','.svelte','.py','.rs','.go','.rb','.php','.java','.c','.h','.cpp','.hpp','.cs','.swift','.kt','.lua','.pl','.r','.dart','.html','.htm','.css','.scss','.sass','.less','.sh','.bash','.zsh','.ps1','.bat','.cmd','.sql','.gitignore','.gitattributes','.dockerignore','.editorconfig','.properties','.gradle'];

/* ================= boot ================= */
const HELPS={
 en:`# MD Lens\n\nLightweight local document viewer.\n\n## Shortcuts\n\n| Action | How |\n|---|---|\n| New / Open | \`Ctrl+N\` / \`Ctrl+O\` · or **drag & drop** onto a pane |\n| Edit → Save | \`Ctrl+E\` → \`Ctrl+S\` |\n| Split | **1 / 2 / 3** at top — each pane has its own **tabs** |\n| Formats | md · txt (render/edit), pdf, docx |\n| Explorer *(app only)* | browse drives/folders in the left panel |\n| Clipboard auto-record *(app only)* | toggle next to "Save clip" |\n| Language | ⚙ top-right |\n`,
 ko:`# MD Lens\n\n가벼운 로컬 문서 뷰어.\n\n## 단축키\n\n| 동작 | 방법 |\n|---|---|\n| 새 파일 / 열기 | \`Ctrl+N\` / \`Ctrl+O\` · 또는 칸에 **드래그&드롭** |\n| 편집 → 저장 | \`Ctrl+E\` → \`Ctrl+S\` |\n| 분할 | 상단 **1 / 2 / 3** — 칸마다 **탭** 있음 |\n| 형식 | md · txt (렌더/편집), pdf, docx |\n| 탐색기 *(앱 전용)* | 왼쪽 패널에서 드라이브/폴더 탐색 |\n| 클립보드 자동기록 *(앱 전용)* | "클립 저장" 옆 토글 |\n| 언어 | 오른쪽 위 ⚙ |\n`,
 ja:`# MD Lens\n\n軽量なローカル文書ビューア。\n\n## ショートカット\n\n| 操作 | 方法 |\n|---|---|\n| 新規 / 開く | \`Ctrl+N\` / \`Ctrl+O\` · またはペインに**ドラッグ&ドロップ** |\n| 編集 → 保存 | \`Ctrl+E\` → \`Ctrl+S\` |\n| 分割 | 上部 **1 / 2 / 3** — 各ペインに**タブ** |\n| 形式 | md · txt (表示/編集), pdf, docx |\n| エクスプローラ *(アプリのみ)* | 左パネルでドライブ/フォルダ探索 |\n| クリップボード自動記録 *(アプリのみ)* | 「クリップ保存」隣のトグル |\n| 言語 | 右上 ⚙ |\n`,
 zh:`# MD Lens\n\n轻量本地文档查看器。\n\n## 快捷键\n\n| 操作 | 方法 |\n|---|---|\n| 新建 / 打开 | \`Ctrl+N\` / \`Ctrl+O\` · 或**拖放**到分屏 |\n| 编辑 → 保存 | \`Ctrl+E\` → \`Ctrl+S\` |\n| 分屏 | 顶部 **1 / 2 / 3** — 每个分屏有**标签页** |\n| 格式 | md · txt (渲染/编辑), pdf, docx |\n| 资源管理器 *(仅应用)* | 在左栏浏览驱动器/文件夹 |\n| 剪贴板自动记录 *(仅应用)* | "保存剪贴"旁的开关 |\n| 语言 | 右上角 ⚙ |\n`,
 fr:`# MD Lens\n\nVisionneuse de documents locale et légère.\n\n## Raccourcis\n\n| Action | Comment |\n|---|---|\n| Nouveau / Ouvrir | \`Ctrl+N\` / \`Ctrl+O\` · ou **glisser-déposer** |\n| Éditer → Enreg. | \`Ctrl+E\` → \`Ctrl+S\` |\n| Diviser | **1 / 2 / 3** en haut — chaque volet a ses **onglets** |\n| Formats | md · txt (rendu/édition), pdf, docx |\n| Explorateur *(app)* | parcourir disques/dossiers à gauche |\n| Auto-enreg. presse-papiers *(app)* | bouton près de « Sauver clip » |\n| Langue | ⚙ en haut à droite |\n`,
 de:`# MD Lens\n\nLeichter lokaler Dokument-Viewer.\n\n## Tastenkürzel\n\n| Aktion | Wie |\n|---|---|\n| Neu / Öffnen | \`Strg+N\` / \`Strg+O\` · oder **Ziehen & Ablegen** |\n| Bearb. → Speichern | \`Strg+E\` → \`Strg+S\` |\n| Teilen | **1 / 2 / 3** oben — jedes Feld hat eigene **Tabs** |\n| Formate | md · txt (Anzeige/Bearb.), pdf, docx |\n| Explorer *(App)* | Laufwerke/Ordner links durchsuchen |\n| Zwischenablage-Auto *(App)* | Schalter neben „Clip sichern" |\n| Sprache | ⚙ oben rechts |\n`,
 es:`# MD Lens\n\nVisor de documentos local y ligero.\n\n## Atajos\n\n| Acción | Cómo |\n|---|---|\n| Nuevo / Abrir | \`Ctrl+N\` / \`Ctrl+O\` · o **arrastrar y soltar** |\n| Editar → Guardar | \`Ctrl+E\` → \`Ctrl+S\` |\n| Dividir | **1 / 2 / 3** arriba — cada panel tiene **pestañas** |\n| Formatos | md · txt (render/edición), pdf, docx |\n| Explorador *(app)* | explora discos/carpetas a la izquierda |\n| Auto-registro portapapeles *(app)* | botón junto a "Guardar clip" |\n| Idioma | ⚙ arriba a la derecha |\n`
};
layoutPanes(paneCount);
applyLang();
drawFavs(); drawLists(); drawClips();
addTab(panes[0], {name:t('helpTitle'),handle:null,tauriPath:null,raw:(HELPS[curLang]||HELPS.en),kind:'md',editing:false,isHelp:true});
setActive(0);
if(!hasFS) flash(t('fBrowserHint'));

/* ---------- Tauri 네이티브 앱 모드 (브라우저에선 window.__TAURI__ 없음 → 스킵) ---------- */
const T = window.__TAURI__;
if (T){
  // 1) 항상 위 고정
  const pin = $('btnPin'); pin.hidden = false;
  let pinned = false;
  pin.onclick = async () => {
    pinned = !pinned;
    try{
      await T.window.getCurrentWindow().setAlwaysOnTop(pinned);
      pin.classList.toggle('on', pinned);
      flash(pinned ? t('fPinOn') : t('fPinOff'));
    }catch(e){ flash(t('fPinFail')+': ' + e); }
  };

  // 2) 더블클릭/연결 프로그램으로 연 파일 자동 로드
  try{
    const lf = await T.core.invoke('launch_file');
    if (lf){
      setActive(0);
      addTab(panes[0], { name: lf.name, handle: null, tauriPath: lf.path,
        raw: lf.content, kind: kindOf(lf.name), editing: false });
    }
  }catch{}

  // 3) 내장 파일 탐색기 (네이티브만 — 드라이브/폴더를 앱 안에서 직접 탐색)
  function b64ToArrayBuffer(b64){
    const bin=atob(b64), len=bin.length, bytes=new Uint8Array(len);
    for(let i=0;i<len;i++) bytes[i]=bin.charCodeAt(i);
    return bytes.buffer;
  }
  async function openNativePath(path, name){
    const kind=kindOf(name), p=panes[active];
    try{
      let doc;
      if(kind==='md'||kind==='txt'){
        doc={ name, kind, handle:null, tauriPath:path, raw:await T.core.invoke('read_text_at',{path}), editing:false };
      } else if(kind==='pdf'){
        const url=URL.createObjectURL(new Blob([b64ToArrayBuffer(await T.core.invoke('read_bytes_at',{path}))],{type:'application/pdf'}));
        doc={ name, kind, handle:null, tauriPath:path, url, raw:'', editing:false };
      } else if(kind==='docx'){
        let html='<p style="color:var(--muted)">'+t('docxFail')+'</p>';
        try{ await loadMammoth(); html=(await window.mammoth.convertToHtml({arrayBuffer:b64ToArrayBuffer(await T.core.invoke('read_bytes_at',{path}))})).value; }catch{}
        doc={ name, kind, handle:null, tauriPath:path, htmlCache:html, raw:'', editing:false };
      } else return;
      addTab(p, doc);
    }catch(e){ flash(t('fOpenFail')+': '+e); }
  }
  async function drawExplorer(container, path){
    container.innerHTML='<div class="empty">'+t('reading')+'</div>';
    let entries;
    try{ entries=await T.core.invoke('read_dir',{path}); }
    catch{ container.innerHTML='<div class="empty">'+t('readFail')+'</div>'; return; }
    container.innerHTML='';
    if(!entries.length){ container.innerHTML='<div class="empty">'+t('emptyDir')+'</div>'; return; }
    for(const en of entries){
      if(en.is_dir){
        const sub=document.createElement('div'); sub.className='subfiles';
        const node=entryEl('📁 '+en.name, async()=>{
          if(sub.childNodes.length){ sub.innerHTML=''; return; }
          await drawExplorer(sub, en.path);
        });
        const w=document.createElement('div'); w.appendChild(node); w.appendChild(sub);
        container.appendChild(w);
      } else {
        container.appendChild(entryEl('📄 '+en.name, ()=>openNativePath(en.path, en.name)));
      }
    }
  }
  // 사이드바 최상단에 탐색기 섹션 삽입
  const side=$('side'), anchor=side.children[1];
  const expH=document.createElement('h3'); expH.dataset.i18n='hExplorer'; expH.textContent=t('hExplorer');
  const expBox=document.createElement('div'); expBox.id='explorer';
  side.insertBefore(expH, anchor); side.insertBefore(expBox, anchor);
  (async()=>{
    let drives=[];
    try{ drives=await T.core.invoke('list_drives'); }catch{}
    expBox.innerHTML='';
    for(const d of drives){
      const sub=document.createElement('div'); sub.className='subfiles';
      const node=entryEl('💽 '+d, async()=>{
        if(sub.childNodes.length){ sub.innerHTML=''; return; }
        await drawExplorer(sub, d);
      });
      const w=document.createElement('div'); w.appendChild(node); w.appendChild(sub);
      expBox.appendChild(w);
    }
  })();

  // 4) 클립보드 자동 기록 (복사할 때마다 자동으로 목록에 쌓임 — on/off 토글, 기본 꺼짐)
  let clipWatch = (await kvGet('clipWatch')) || false;
  const cwBtn = document.createElement('button');
  cwBtn.style.cssText = 'font-size:11px';
  const cwLabel = () => { cwBtn.textContent = t('autoRec')+(clipWatch?' ▶':' ⏸'); cwBtn.classList.toggle('on', clipWatch); };
  $('btnClip').after(cwBtn); cwLabel();
  refreshExtras = cwLabel;   // 언어 변경 시 라벨 갱신
  try{ await T.core.invoke('set_clip_watch', { on: clipWatch }); }catch{}
  cwBtn.onclick = async () => {
    clipWatch = !clipWatch;
    await kvSet('clipWatch', clipWatch);
    try{ await T.core.invoke('set_clip_watch', { on: clipWatch }); }catch{}
    cwLabel(); flash(clipWatch ? t('fAutoOn') : t('fAutoOff'));
  };
  try{
    await T.event.listen('clip-added', ev => {
      const txt = ev.payload; if(!txt || !txt.trim()) return;
      if(clips[0] && clips[0].t === txt) return;   // 연속 중복 제외
      clips.unshift({ t:txt, at: Date.now() }); clips = clips.slice(0, 50);
      kvSet('clips', clips); drawClips();
    });
  }catch{}

  // 5) 빠른 번역 (선택 시에만 뜨는 작은 박스 — 온라인, 현재 UI 언어로. 로컬퍼스트라 비중 약함)
  const trBox=document.createElement('div'); trBox.id='trbox'; trBox.hidden=true; document.body.appendChild(trBox);
  const hideTr=()=>{ trBox.hidden=true; };
  document.addEventListener('scroll',hideTr,true);
  document.addEventListener('mousedown',e=>{ if(!trBox.contains(e.target)) hideTr(); });
  document.addEventListener('mouseup',e=>{
    if(trBox.contains(e.target)) return;
    setTimeout(()=>{
      const sel=(window.getSelection&&window.getSelection().toString()||'').trim();
      if(!sel || sel.length>1500 || (e.target.closest && e.target.closest('.pedit'))){ hideTr(); return; }
      trBox.innerHTML='';
      const btn=document.createElement('button');
      btn.textContent='🌐 '+t('translate');
      btn.onclick=async()=>{
        btn.textContent='🌐 …';
        try{ const r=await T.core.invoke('translate_text',{text:sel,target:curLang});
          trBox.innerHTML='<div class="trres">'+esc(r)+'</div>'; }
        catch{ trBox.innerHTML='<div class="trres">'+t('trFail')+'</div>'; }
      };
      trBox.appendChild(btn);
      trBox.style.left=Math.min(e.clientX, window.innerWidth-350)+'px';
      trBox.style.top=(e.clientY+10)+'px';
      trBox.hidden=false;
    },10);
  });
}
</script>
